<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Access</title>
</head>
<body style="font-family: 'Sarabun', sans-serif; text-align: center; padding-top: 80px; background-color: #f4f4f4;">
    
    <h3 id="statusBox" style="color: #D4AF37;">โปรดรอ..กำลังเข้าสู่ระบบสมาชิก...</h3>

    <script>
        // 🔴 1. ลิงก์ Web App (หลังบ้าน)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgL4S8F0sQIEiC3Bs_E_w1a9EbDoQaoDufRlIocD1RGnMlHxt-w63csISDlbPEfGYn/exec";
        
        // 🔴 2. ลิงก์ปลายทาง VIP (ลูกค้าจะเด้งมาที่นี่)
        const VIP_LIFF_URL = "https://liff.line.me/2000157117-6BGWUTTj";

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (token) {
            fetch(SCRIPT_URL + "?action=verifyToken&token=" + token)
                .then(response => response.json())
                .then(data => {
                    if (data.status === "success") {
                        // เช็คผ่าน! เด้งเข้า LIFF VIP ทันที
                        window.location.replace(VIP_LIFF_URL);
                    } else {
                        document.getElementById('statusBox').innerHTML = "<span style='color:#d32f2f;'>สิทธิประโยชน์สิ้นสุดลงแล้ว</span><br><span style='font-size:14px; color:#555;'>กรุณาติดต่อเซลล์ประจำตัวของท่าน</span>";
                    }
                })
                .catch(error => {
                    document.getElementById('statusBox').innerText = "ระบบขัดข้อง กรุณาลองใหม่อีกครั้ง";
                });
        } else {
            document.getElementById('statusBox').innerText = "ไม่พบรหัสการเข้าถึง";
        }
    </script>
</body>
</html>
