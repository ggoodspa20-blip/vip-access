<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Access</title>
    <style>
        body { font-family: 'Sarabun', sans-serif; text-align: center; padding-top: 80px; background-color: #f4f4f4; }
        .message { color: #D4AF37; font-size: 20px; font-weight: bold; }
        .error { color: #d32f2f; font-size: 18px; }
    </style>
</head>
<body>

    <div id="statusBox" class="message">กำลังพาท่านเข้าสู่สิทธิประโยชน์เหนือระดับ...</div>

    <script>
        // 🔴 1. วาง URL Web App (Google Apps Script) ของคุณที่นี่
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbza_cNw9kh4pz7OdYIpA-r4Sg4vql3ALxOu7PbKkKDZQOnEwbu5PJTarc4bI7RW95qE/exec";
        
        // 🔴 2. วางลิงก์ LIFF ปลายทาง (VIP MEMBER) ที่นี่
        const VIP_LIFF_URL = "https://liff.line.me/2000157117-6BGWUTTj";

        // ดึงรหัส Token จาก QR Code
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (token) {
            // ส่งรหัสไปเช็คหลังบ้านเงียบๆ
            fetch(SCRIPT_URL + "?action=verifyToken&token=" + token)
                .then(response => response.json())
                .then(data => {
                    if (data.status === "success") {
                        // ถ้าผ่าน เด้งเข้า LIFF ทันที (ซ่อนลิงก์ 100%)
                        window.location.replace(VIP_LIFF_URL);
                    } else {
                        document.getElementById('statusBox').className = "error";
                        document.getElementById('statusBox').innerHTML = "สิทธิประโยชน์สิ้นสุดลงแล้ว<br><span style='font-size:14px; color:#555;'>กรุณาติดต่อเซลล์ประจำตัวของท่าน</span>";
                    }
                })
                .catch(error => {
                    document.getElementById('statusBox').className = "error";
                    document.getElementById('statusBox').innerText = "ระบบขัดข้อง กรุณาลองใหม่อีกครั้ง";
                });
        } else {
            document.getElementById('statusBox').className = "error";
            document.getElementById('statusBox').innerText = "ไม่พบรหัสการเข้าถึง";
        }
    </script>

</body>
</html>
